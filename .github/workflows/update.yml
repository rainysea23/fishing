name: Update Fishing Calendar

on:
  schedule:
    - cron: '0 */2 * * *'   # 2시간마다 (UTC)
  workflow_dispatch:        # 수동 실행 시 항상 알림 전송

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Telegram 설정 확인
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN 미설정"
          else
            echo "✅ TELEGRAM_BOT_TOKEN 설정됨 (앞 10자: ${TELEGRAM_BOT_TOKEN:0:10}...)"
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_CHAT_ID 미설정"
          else
            echo "✅ TELEGRAM_CHAT_ID 설정됨: $TELEGRAM_CHAT_ID"
          fi
          echo "TELEGRAM_NOTIFY=$TELEGRAM_NOTIFY"
          echo "event_name=${{ github.event_name }}"

      - name: Run crawler & generate calendar
        run: python scripts/main.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 예약 현황 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
